<html lang="es">
<head>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Oxanium:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* Paleta del módulo · teal = capital / lo tuyo · naranjo = interés / costo · pizarra = tasa — theme-aware */
  :root{
    --cr-org:#ff7a1a; --cr-org-ink:#d9640f; --cr-org-soft:rgba(255,122,26,.09); --cr-org-line:rgba(255,122,26,.24);
    --cr-teal-ink:#0a8f7a; --cr-teal-soft:var(--accent-soft); --cr-teal-line:rgba(15,184,156,.26);
    --cr-slate:#4c6b80; --cr-slate-soft:#eef2f6; --cr-sq-pend:#e9edeb; --cr-grid:#eef2f0;
  }
  [data-theme="dark"]{
    --cr-org:#ff9a4d; --cr-org-ink:#ffb070; --cr-org-soft:rgba(255,154,77,.13); --cr-org-line:rgba(255,154,77,.26);
    --cr-teal-ink:var(--accent); --cr-teal-line:rgba(44,240,201,.24);
    --cr-slate:#9fc0d6; --cr-slate-soft:rgba(159,192,214,.12); --cr-sq-pend:rgba(255,255,255,.09); --cr-grid:rgba(255,255,255,.08);
  }

  .cred-sum{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin:0 2px 20px}
  .cred-sum .cs-lbl{font-family:var(--mono);font-size:.7rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-weight:500}
  .cred-sum .cs-v{font-family:var(--mono);font-weight:700;font-size:1.55rem;letter-spacing:-.02em;color:var(--ink)}
  .cred-sum .cs-sub{font-size:.82rem;color:var(--muted)}
  .cred{margin-bottom:14px}
  .cred-estado{display:inline-flex;align-items:center;gap:7px;font-size:.78rem;font-weight:600;padding:5px 12px;border-radius:20px}
  .cred-estado .dot{width:7px;height:7px;border-radius:50%}
  .cred-estado.vig{color:#15824c;background:var(--green-soft);border:1px solid rgba(21,130,76,.22)}
  .cred-estado.vig .dot{background:#15824c}
  [data-theme="dark"] .cred-estado.vig{color:#3ad97f;border-color:rgba(58,217,127,.22)}
  [data-theme="dark"] .cred-estado.vig .dot{background:#3ad97f}
  .cred-estado.pag{color:var(--muted);background:var(--panel-2);border:1px solid var(--line)}
  .cred-estado.pag .dot{background:var(--faint)}
  .cred-body{padding:20px 22px}

  /* ===== Parte fija (hero + avance) ===== */
  .cred-hero{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap;padding-bottom:18px;border-bottom:1px solid var(--line)}
  .cred-lbl{font-family:var(--mono);font-size:.64rem;text-transform:uppercase;letter-spacing:.09em;color:var(--faint);font-weight:500;margin-bottom:9px}
  .cred-big{font-family:var(--mono);font-weight:700;font-size:2.3rem;letter-spacing:-.03em;line-height:1;color:var(--ink)}
  .cred-sub{font-family:var(--mono);font-size:.8rem;color:var(--muted);margin-top:9px}
  .cred-prox{text-align:right}
  .cred-prox-v{font-family:var(--mono);font-weight:600;font-size:1.3rem;color:var(--accent);line-height:1}
  .cred-progwrap{padding:16px 0;border-bottom:1px solid var(--line)}
  .cred-progtop{display:flex;justify-content:space-between;font-size:.82rem;color:var(--muted);margin-bottom:9px;font-family:var(--mono)}
  .cred-bar{height:8px;background:var(--panel-2);border:1px solid var(--line);border-radius:5px;overflow:hidden}
  .cred-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#ff7a1a);border-radius:5px}

  /* ===== Resumen (diseño 3): tarjetas hero con anillo + chips + pie ===== */
  .cred-nsec{font-family:var(--mono);font-size:.6rem;letter-spacing:.11em;text-transform:uppercase;color:var(--faint);font-weight:600;margin:20px 0 12px}
  .cred-feat{display:grid;grid-template-columns:repeat(auto-fit,minmax(258px,1fr));gap:14px}
  .cred-fc{border-radius:13px;padding:15px 18px;display:flex;align-items:center;justify-content:center;gap:18px}
  .cred-fc.teal{background:var(--cr-teal-soft);border:1px solid var(--cr-teal-line)}
  .cred-fc.org{background:var(--cr-org-soft);border:1px solid var(--cr-org-line)}
  .cred-rg{flex:none;position:relative;width:78px;height:78px}
  .cred-rg svg{width:78px;height:78px;display:block}
  .cred-rg circle{fill:none;stroke-width:9}
  .cred-rg .rc{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:.92rem}
  .cred-fc.teal .rg-t{stroke:var(--cr-teal-line)} .cred-fc.teal .rg-f{stroke:var(--accent);stroke-linecap:round} .cred-fc.teal .rc{color:var(--cr-teal-ink)}
  .cred-fc.org  .rg-t{stroke:var(--cr-org-line)}  .cred-fc.org  .rg-f{stroke:var(--cr-org);stroke-linecap:round}  .cred-fc.org  .rc{color:var(--cr-org-ink)}
  .cred-fl{font-size:.72rem;color:var(--muted);font-weight:500}
  .cred-fv{font-family:var(--mono);font-weight:700;font-size:1.7rem;letter-spacing:-.03em;line-height:1.05;margin:3px 0}
  .cred-fc.teal .cred-fv{color:var(--cr-teal-ink)} .cred-fc.org .cred-fv{color:var(--cr-org-ink)}
  .cred-fs{font-size:.72rem;font-family:var(--mono);color:var(--muted)}

  .cred-chips{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-top:14px}
  .cred-chip{display:flex;align-items:center;gap:11px;border:1px solid var(--line);border-radius:10px;padding:9px 13px;background:var(--panel-2)}
  .cred-chip .ci{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:none}
  .cred-chip .ci svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
  .cred-chip .cl{font-size:.63rem;text-transform:uppercase;letter-spacing:.05em;color:var(--faint)}
  .cred-chip .cv{font-family:var(--mono);font-weight:700;font-size:.95rem;margin-top:1px;color:var(--ink)}
  .cred-chip .cv small{font-weight:400;color:var(--muted);font-size:.82em}

  .cred-foot{display:flex;flex-wrap:wrap;justify-content:center;gap:7px 18px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line);font-size:.76rem;color:var(--muted);font-family:var(--mono)}
  .cred-foot span{display:inline-flex;align-items:center;gap:6px}
  .cred-foot b{color:var(--ink);font-weight:600}
  .cred-foot svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;color:var(--faint);flex:none}

  /* ===== Tablas de pagos y calendario ===== */
  .cred-cal{margin-bottom:18px}
  .cred-link{display:inline-flex;align-items:center;gap:6px;font-size:.74rem;color:var(--accent);font-family:var(--mono)}
  .cred-link svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
  .cred-caltbl{max-height:440px;overflow:auto}
  .cred-caltbl table{width:100%;border-collapse:collapse;font-size:.86rem}
  .cred-caltbl th{text-align:left;padding:11px 22px;font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:500;position:sticky;top:0;background:var(--panel);border-bottom:1px solid var(--line);z-index:1}
  .cred-caltbl th.num,.cred-caltbl td.num{text-align:right}
  .cred-caltbl td{padding:11px 22px;border-bottom:1px solid var(--line-2);color:var(--ink)}
  .cred-caltbl td.num{font-family:var(--mono)}
  .cred-caltbl tr:hover td{background:var(--panel-2)}
  .cred-cn{font-family:var(--mono);color:var(--cr-teal-ink);font-weight:600}
  .cred-ok{color:var(--green);font-weight:600}

  /* ===== Gráficos (anatomía de la cuota + avance del crédito) ===== */
  .cred-graf{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
  @media(max-width:880px){.cred-graf{grid-template-columns:1fr}}
  .cred-glg{display:inline-flex;gap:12px;font-family:var(--mono);font-size:.68rem;color:var(--muted);font-weight:500}
  .cred-glg i{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:5px}
  .cred-glg i.teal{background:var(--accent)}
  .cred-glg i.org{background:#ff7a1a}
  .cred-glg i.pend{background:var(--cr-sq-pend)}
  .cred-gbody{padding:16px 16px 14px;display:flex;align-items:center;justify-content:center;min-height:150px}
  .cred-gbody svg{width:100%;display:block}
  .cred-gbody svg text{font-family:var(--mono)}
  .cred-gbody .ax{font-size:10px;fill:var(--faint)}
  .cred-gbody .cl{font-size:9.5px;fill:var(--muted)}
  .cred-gbody .cl2{font-size:10px;fill:var(--muted);opacity:.55}
  .cred-gbody .clteal{font-size:9.5px;fill:var(--cr-teal-ink);font-weight:600}
  .cred-gbody .clorg{font-size:9.5px;fill:var(--cr-org-ink);font-weight:600}
  .cred-gbody .hoy{font-size:9.5px;fill:var(--ink);font-weight:600}
  .cred-gbody .kpi{fill:var(--cr-teal-ink);font-weight:700}
  .cred-gbody .ccpaid{font-size:10px;fill:var(--cr-teal-ink);font-weight:600}
  .cgsq{transition:filter .12s}
  .cgsq:hover{filter:brightness(1.09)}
  .cgz{cursor:crosshair}
  .cred-tip{position:fixed;z-index:9999;pointer-events:none;background:var(--ink);color:var(--panel);font-family:var(--mono);font-size:.72rem;line-height:1.55;padding:8px 11px;border-radius:9px;box-shadow:0 8px 22px rgba(0,0,0,.28);opacity:0;transition:opacity .12s;white-space:nowrap}
  .cred-tip b{font-weight:700}
</style>
</head>

<aside class="side">
  <a class="brand" href="/"><span class="mark"><img src="assets/logo/cb-isotipo.png" alt="CB"></span><span><b>Canchas Bosquemar</b><small>Intranet</small></span></a>
  <nav class="nav"></nav>

</aside>
<div class="main">
  <header class="topbar">
    <h1>Créditos</h1>
    <div class="right"><div class="user"></div></div>
  </header>
  <div class="content">
    <!-- Sprite de íconos del módulo -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
      <symbol id="cr-cash" viewBox="0 0 24 24"><rect x="2.5" y="6" width="19" height="12" rx="2.2"/><circle cx="12" cy="12" r="2.6"/><path d="M6 9.4h.01M18 14.6h.01"/></symbol>
      <symbol id="cr-pct" viewBox="0 0 24 24"><circle cx="7" cy="7" r="2.3"/><circle cx="17" cy="17" r="2.3"/><path d="M18 6 6 18"/></symbol>
      <symbol id="cr-cal" viewBox="0 0 24 24"><rect x="3.5" y="5" width="17" height="15" rx="2.2"/><path d="M3.5 9.5h17M8 3v4M16 3v4"/></symbol>
      <symbol id="cr-doc" viewBox="0 0 24 24"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></symbol>
      <symbol id="cr-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M12 7.5V12l3 2"/></symbol>
      <symbol id="cr-build" viewBox="0 0 24 24"><path d="M4 21V6l8-3 8 3v15M9 21v-5h6v5M8 9.5h.01M12 9.5h.01M16 9.5h.01M8 13.5h.01M12 13.5h.01M16 13.5h.01"/></symbol>
      <symbol id="cr-bank" viewBox="0 0 24 24"><path d="M3 9.5 12 4l9 5.5M5 10.5v7.5M19 10.5v7.5M9.5 10.5v7.5M14.5 10.5v7.5M3.5 20.5h17"/></symbol>
      <symbol id="cr-link" viewBox="0 0 24 24"><path d="M9 15l6-6M10.5 6.5 12 5a3.5 3.5 0 0 1 5 5l-1.5 1.5M13.5 17.5 12 19a3.5 3.5 0 0 1-5-5l1.5-1.5"/></symbol>
    </defs></svg>

    <div class="cred-sum" id="credSum"></div>
    <div id="creditos"></div>
  </div>
</div>
<script>
(function(){
  var MES=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var CREDITOS=[], MOVS=[];
  function fmt(n){return (n<0?'−$':'$')+Math.abs(Math.round(n)).toLocaleString('es-CL');}
  function fdate(d){return d.slice(8,10)+' '+MES[+d.slice(5,7)-1]+' '+d.slice(0,4);}
  function pct(x,dec){return (x*100).toLocaleString('es-CL',{minimumFractionDigits:dec||0,maximumFractionDigits:dec||0})+'%';}
  function pc2(x){return x.toLocaleString('es-CL',{minimumFractionDigits:2,maximumFractionDigits:2})+'%';}
  function logoEmp(e){return e==='CB'?'<img class="lg-cb" src="assets/logo/cb-isotipo.png" alt="CB">':'<img class="lg-qq" src="assets/logo/qq.svg" alt="QQ">';}
  function ico(id){return '<svg><use href="#cr-'+id+'"></use></svg>';}

  // Indicadores + enlace a las cartolas (qq-movimientos.json). Los pagos que matchean la glosa
  // del crédito son la fuente de verdad: cuando cargues una cartola con el próximo pago, sube solo.
  function calc(c,movs){
    var pagos=(movs||[]).filter(function(m){return m.glosa===c.pagoGlosa && (!c.pagoCuenta||m.cuenta===c.pagoCuenta);})
                        .sort(function(a,b){return a.fecha<b.fecha?-1:(a.fecha>b.fecha?1:0);});
    var base=c.cuotasPagadas;                 // cal[] arranca en la cuota (base+1)
    var paidN=Math.max(base,pagos.length);    // cuotas pagadas reales
    var shift=Math.max(0,pagos.length-base);
    var pend=c.cal.slice(shift);              // cuotas aún pendientes
    var capPend=pend.reduce(function(s,r){return s+r[1];},0);
    var intPend=pend.reduce(function(s,r){return s+r[2];},0);
    var capPagado=c.monto-capPend, saldo=capPend+intPend;
    var intTotal=(paidN*c.valorCuota+saldo)-c.monto;
    return {pagos:pagos,paidN:paidN,pend:pend,restantes:pend.length,capPend:capPend,intPend:intPend,
      capPagado:capPagado,saldo:saldo,intTotal:intTotal,avance:paidN/c.nCuotas,
      capPct:capPagado/c.monto,intSobreCap:intTotal/c.monto,tasaMens:c.tasaAnual/12,proxNum:paidN+1};
  }

  function ring(kind,valuePct,label){
    var v=Math.max(0,Math.min(100,valuePct));
    return '<span class="cred-rg"><svg viewBox="0 0 78 78">'+
      '<circle class="rg-t" cx="39" cy="39" r="31"></circle>'+
      '<circle class="rg-f" cx="39" cy="39" r="31" pathLength="100" stroke-dasharray="'+v.toFixed(1)+' '+(100-v).toFixed(1)+'" transform="rotate(-90 39 39)"></circle>'+
      '</svg><span class="rc">'+label+'</span></span>';
  }
  function chip(bg,color,iconId,lbl,val){
    return '<div class="cred-chip"><span class="ci" style="background:'+bg+';color:'+color+'">'+ico(iconId)+'</span>'+
      '<div><div class="cl">'+lbl+'</div><div class="cv">'+val+'</div></div></div>';
  }

  // ===== Gráficos · anatomía de la cuota (líneas) + avance del crédito (cuadritos por año) =====
  // El calendario completo (36) = calPagadas (7 reconstruidas) + cal (29). El coloreado usa las
  // cuotas pagadas REALES (k.paidN, derivadas de las cartolas), así que el avance sube solo.
  var G={W:470,H:248,mL:40,mR:12,mT:16,mB:28,yMax:10000000};
  G.x0=G.mL;G.x1=G.W-G.mR;G.y0=G.mT;G.y1=G.H-G.mB;
  function GX(i){return G.x0+i/35*(G.x1-G.x0);}
  function GY(v){return G.y1-v/G.yMax*(G.y1-G.y0);}
  function gf(n){return (+n).toFixed(1);}
  function gv(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();}
  function pal(){return {teal:gv('--accent'),org:gv('--cr-org'),grid:gv('--cr-grid'),pend:gv('--cr-sq-pend')};}
  function sched(c){return (c.calPagadas||[]).concat(c.cal);}

  function anatSVG(c,paidN,P){
    var S=sched(c);
    var capP=S.map(function(d,i){return [GX(i),GY(d[1])];});
    var intP=S.map(function(d,i){return [GX(i),GY(d[2])];});
    var pl=function(pts){return pts.map(function(p,k){return (k?'L':'M')+gf(p[0])+' '+gf(p[1]);}).join(' ');};
    var Lp=function(pts){return pts.map(function(p){return 'L'+gf(p[0])+' '+gf(p[1]);}).join('');};
    var intFill='M'+gf(intP[0][0])+' '+gf(G.y1)+Lp(intP)+'L'+gf(intP[35][0])+' '+gf(G.y1)+'Z';
    var g='';[0,5000000,10000000].forEach(function(t){var y=gf(GY(t));g+='<line x1="'+G.x0+'" y1="'+y+'" x2="'+G.x1+'" y2="'+y+'" stroke="'+P.grid+'"/><text x="'+(G.x0-7)+'" y="'+gf(GY(t)+3)+'" text-anchor="end" class="ax">$'+(t/1e6)+'M</text>';});
    var xl='';[0,11,23,35].forEach(function(i){xl+='<text x="'+gf(GX(i))+'" y="'+(G.y1+15)+'" text-anchor="middle" class="ax">'+(i+1)+'</text>';});
    var xh=gf(GX(Math.max(0,paidN)-0.5));
    var hoy=paidN>0?'<line x1="'+xh+'" y1="'+G.y0+'" x2="'+xh+'" y2="'+G.y1+'" stroke="'+P.org+'" stroke-dasharray="3 3" opacity=".55"/><text x="'+xh+'" y="'+(G.y0-4)+'" text-anchor="middle" class="hoy">hoy</text>':'';
    var step=(G.x1-G.x0)/35, hz='';
    for(var i=0;i<36;i++){var est=i<paidN?'pagada':(i===paidN?'próxima':'pendiente');
      hz+='<rect class="cgz" x="'+gf(GX(i)-step/2)+'" y="'+G.y0+'" width="'+gf(step)+'" height="'+gf(G.y1-G.y0)+'" fill="transparent" data-c="'+(i+1)+'" data-cap="'+S[i][1]+'" data-int="'+S[i][2]+'" data-est="'+est+'" data-fec="'+S[i][0]+'"/>';}
    var ind='<g class="cgind" style="opacity:0" pointer-events="none"><line x1="0" y1="'+G.y0+'" x2="0" y2="'+G.y1+'" stroke="'+P.grid+'" stroke-width="1"/><circle class="d1" r="3.2" fill="'+P.teal+'"/><circle class="d2" r="3.2" fill="'+P.org+'"/></g>';
    return '<svg viewBox="0 0 '+G.W+' '+G.H+'" width="100%">'+g+'<path d="'+intFill+'" fill="'+P.org+'" opacity=".12"/>'+
      '<path d="'+pl(capP)+'" fill="none" stroke="'+P.teal+'" stroke-width="2.2" stroke-linejoin="round"/>'+
      '<path d="'+pl(intP)+'" fill="none" stroke="'+P.org+'" stroke-width="2.2" stroke-linejoin="round"/>'+
      '<text x="'+gf(GX(2))+'" y="'+gf(GY(S[2][1])-8)+'" class="clteal">Capital</text><text x="'+gf(GX(2))+'" y="'+gf(GY(S[2][2])+14)+'" class="clorg">Interés</text>'+
      hoy+xl+ind+hz+'</svg>';
  }

  function avanceSVG(c,paidN,P){
    var S=sched(c), YS=['2026','2027','2028'];
    var cell=18,gap=5,sx=120,cols=12,rows=3,cntW=44,W=sx+cols*cell+(cols-1)*gap+cntW,H=rows*cell+(rows-1)*gap;
    var pby=[0,0,0]; for(var j=0;j<paidN&&j<36;j++)pby[Math.floor(j/12)]++;
    var r='';
    for(var i=0;i<36;i++){var yr=Math.floor(i/12),pos=i%12,x=sx+pos*(cell+gap),y=yr*(cell+gap);
      var paid=i<paidN,nx=i===paidN,est=paid?'pagada':(nx?'próxima':'pendiente');
      r+='<rect class="cgsq" x="'+x+'" y="'+y+'" width="'+cell+'" height="'+cell+'" rx="4" fill="'+(paid?P.teal:P.pend)+'"'+(nx?' stroke="'+P.org+'" stroke-width="2"':'')+' data-c="'+(i+1)+'" data-est="'+est+'" data-fec="'+S[i][0]+'"/>';}
    var xe=sx+cols*cell+(cols-1)*gap;
    for(var k=0;k<3;k++){var cy=k*(cell+gap)+cell/2+3.5;
      r+='<text x="112" y="'+cy+'" text-anchor="end" class="ax">'+YS[k]+'</text>';
      r+='<text x="'+(xe+8)+'" y="'+cy+'" class="'+(pby[k]?'ccpaid':'cl2')+'">'+pby[k]+'/12</text>';}
    r+='<text x="0" y="'+(H/2-3)+'" class="kpi" style="font-size:23px">'+paidN+'/36</text><text x="0" y="'+(H/2+14)+'" class="cl">'+Math.round(paidN/36*100)+'% pagado</text>';
    return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="max-width:'+W+'px">'+r+'</svg>';
  }

  function grafBlock(c){
    return '<div class="cred-graf">'+
      '<div class="card"><div class="card-h"><h3>Anatomía de la cuota</h3><span class="cred-glg"><span><i class="teal"></i>Capital</span><span><i class="org"></i>Interés</span></span></div><div class="cred-gbody" id="ganat-'+c.id+'"></div></div>'+
      '<div class="card"><div class="card-h"><h3>Avance del crédito</h3><span class="cred-glg"><span><i class="teal"></i>Pagada</span><span><i class="pend"></i>Pendiente</span></span></div><div class="cred-gbody" id="gav-'+c.id+'"></div></div>'+
    '</div>';
  }

  var _tip;
  function tipEl(){if(!_tip){_tip=document.createElement('div');_tip.className='cred-tip';document.body.appendChild(_tip);}return _tip;}
  function estTxt(e){return e==='pagada'?'✓ pagada':(e==='próxima'?'próxima cuota':'pendiente');}
  function wire(el,kind){
    var t=tipEl();
    el.addEventListener('mousemove',function(e){
      var g=e.target.closest('[data-c]'), ind=el.querySelector('.cgind');
      if(!g){t.style.opacity=0;if(ind)ind.style.opacity=0;return;}
      var c=g.getAttribute('data-c'),est=g.getAttribute('data-est'),fec=g.getAttribute('data-fec');
      var html='<b>Cuota '+c+'/36</b> · '+estTxt(est);
      if(kind==='anat'){var cap=+g.getAttribute('data-cap'),it=+g.getAttribute('data-int');
        html+='<br>Capital '+fmt(cap)+'<br>Interés '+fmt(it)+'<br>Cuota '+fmt(cap+it);
        if(ind){var i=+c-1,xx=GX(i);ind.style.opacity=1;
          var ln=ind.querySelector('line'),d1=ind.querySelector('.d1'),d2=ind.querySelector('.d2');
          ln.setAttribute('x1',xx);ln.setAttribute('x2',xx);
          d1.setAttribute('cx',xx);d1.setAttribute('cy',GY(cap));d2.setAttribute('cx',xx);d2.setAttribute('cy',GY(it));}
      }else{html+='<br>'+(est==='pagada'?'Pagada el ':'Vence ')+fdate(fec);}
      t.innerHTML=html;t.style.opacity=1;
      var tx=e.clientX+14,ty=e.clientY+16;
      if(tx+220>window.innerWidth)tx=e.clientX-210;
      t.style.left=tx+'px';t.style.top=ty+'px';
    });
    el.addEventListener('mouseleave',function(){t.style.opacity=0;var ind=el.querySelector('.cgind');if(ind)ind.style.opacity=0;});
  }

  function paintOne(c){var k=calc(c,MOVS),P=pal();
    var an=document.getElementById('ganat-'+c.id),av=document.getElementById('gav-'+c.id);
    if(an)an.innerHTML=anatSVG(c,k.paidN,P);
    if(av)av.innerHTML=avanceSVG(c,k.paidN,P);
  }
  function initCharts(){CREDITOS.forEach(function(c){paintOne(c);
    var an=document.getElementById('ganat-'+c.id),av=document.getElementById('gav-'+c.id);
    if(an)wire(an,'anat');if(av)wire(av,'avance');});}
  window.addEventListener('themechange',function(){CREDITOS.forEach(paintOne);});

  function renderCredito(c,movs){
    var k=calc(c,movs);
    var badge='<span class="cred-estado '+(c.estado==='vigente'?'vig':'pag')+'"><span class="dot"></span>'+(c.estado==='vigente'?'Vigente':'Pagado')+'</span>';

    var resumen=
      '<div class="cred-nsec">Indicadores del crédito</div>'+
      '<div class="cred-feat">'+
        '<div class="cred-fc teal">'+ring('teal',k.capPct*100,pct(k.capPct,1))+
          '<div><div class="cred-fl">Capital pagado</div><div class="cred-fv">'+fmt(k.capPagado)+'</div><div class="cred-fs">amortizado de '+fmt(c.monto)+'</div></div></div>'+
        '<div class="cred-fc org">'+ring('org',k.intSobreCap*100,pct(k.intSobreCap,1))+
          '<div><div class="cred-fl">Interés total del crédito</div><div class="cred-fv">'+fmt(k.intTotal)+'</div><div class="cred-fs">sobre el capital · tasa '+pc2(c.tasaAnual)+'</div></div></div>'+
      '</div>'+
      '<div class="cred-chips">'+
        chip('var(--cr-slate-soft)','var(--cr-slate)','pct','Tasa','<b>'+pc2(c.tasaAnual)+'</b> anual <small>· '+pc2(k.tasaMens)+' mensual · '+c.tasaTipo+'</small>')+
        chip('var(--panel)','var(--muted)','cal','Cuota mensual',fmt(c.valorCuota))+
        chip('var(--cr-teal-soft)','var(--accent)','cash','Líquido recibido',fmt(c.liquido))+
        chip('var(--panel)','var(--muted)','doc','Gastos otorgamiento',fmt(c.impuesto+c.notario))+
      '</div>'+
      '<div class="cred-foot">'+
        '<span>'+ico('cash')+'Monto original <b>'+fmt(c.monto)+'</b></span>'+
        '<span>'+ico('clock')+'<b>'+fdate(c.emision)+' → '+fdate(c.termino)+'</b></span>'+
        '<span>'+ico('build')+c.titular+'</span>'+
        '<span>'+ico('bank')+c.banco+'</span>'+
        '<span>'+ico('doc')+'op <b>'+c.operacion+'</b></span>'+
      '</div>';

    var pagosCard='';
    if(k.pagos.length){
      var pagosRows=k.pagos.map(function(p,i){
        return '<tr><td class="cred-cn">'+(i+1)+'/'+c.nCuotas+'</td><td>'+fdate(p.fecha)+'</td><td class="num">'+fmt(Math.abs(p.monto))+'</td><td class="num cred-ok">✓ pagada</td></tr>';
      }).join('');
      pagosCard='<div class="card cred-cal"><div class="card-h"><h3>Pagos realizados</h3><span class="cred-link">'+ico('link')+'enlazado a cartolas · '+k.pagos.length+' cuotas</span></div>'+
        '<div class="cred-caltbl"><table><thead><tr><th>N° cuota</th><th>Fecha de pago</th><th class="num">Monto</th><th class="num">Estado</th></tr></thead><tbody>'+pagosRows+'</tbody></table></div></div>';
    }

    var calRows=k.pend.map(function(r,i){
      return '<tr><td class="cred-cn">'+(k.proxNum+i)+'/'+c.nCuotas+'</td><td>'+fdate(r[0])+'</td><td class="num">'+fmt(r[1])+'</td><td class="num">'+fmt(r[2])+'</td><td class="num"><b>'+fmt(r[1]+r[2])+'</b></td></tr>';
    }).join('');
    var calCard='<div class="card cred-cal"><div class="card-h"><h3>Calendario de pagos</h3><span style="font-size:.8rem;color:var(--muted)">'+k.restantes+' cuotas pendientes</span></div>'+
      '<div class="cred-caltbl"><table><thead><tr><th>N° cuota</th><th>Vencimiento</th><th class="num">Capital</th><th class="num">Interés</th><th class="num">Cuota</th></tr></thead><tbody>'+calRows+'</tbody></table></div></div>';

    return '<div class="totales cred">'+
      '<div class="th"><h3>'+logoEmp(c.empresa)+' '+c.destino+'</h3>'+badge+'</div>'+
      '<div class="cred-body">'+
        '<div class="cred-hero">'+
          '<div><div class="cred-lbl">Saldo por pagar · '+k.restantes+' cuotas</div><div class="cred-big">'+fmt(k.saldo)+'</div>'+
            '<div class="cred-sub">Capital '+fmt(k.capPend)+' &nbsp;·&nbsp; Interés '+fmt(k.intPend)+'</div></div>'+
          '<div class="cred-prox"><div class="cred-lbl">Próxima cuota</div><div class="cred-prox-v">'+fmt(c.valorCuota)+'</div><div class="cred-sub">'+(k.pend[0]?fdate(k.pend[0][0]):'—')+'</div></div>'+
        '</div>'+
        '<div class="cred-progwrap"><div class="cred-progtop"><span>'+k.paidN+' de '+c.nCuotas+' cuotas pagadas</span><span>'+pct(k.avance,0)+'</span></div>'+
          '<div class="cred-bar"><i style="width:'+(k.avance*100).toFixed(1)+'%"></i></div></div>'+
        resumen+
      '</div></div>'+
      grafBlock(c)+pagosCard+calCard;
  }

  Promise.all([
    fetch('data/creditos.json?v=3').then(function(r){return r.json();}),
    fetch('data/qq-movimientos.json?v=1').then(function(r){return r.json();}).catch(function(){return {movimientos:[]};})
  ]).then(function(res){
    var d=res[0], movs=(res[1]&&res[1].movimientos)||[];
    CREDITOS=d.creditos; MOVS=movs;
    document.getElementById('creditos').innerHTML=d.creditos.map(function(c){return renderCredito(c,movs);}).join('');
    var vig=d.creditos.filter(function(c){return c.estado==='vigente';});
    var totSaldo=vig.reduce(function(s,c){return s+calc(c,movs).saldo;},0);
    document.getElementById('credSum').innerHTML='<span class="cs-lbl">Deuda vigente</span><span class="cs-v">'+fmt(totSaldo)+'</span><span class="cs-sub">'+vig.length+' crédito'+(vig.length>1?'s':'')+' · al '+fdate(d.updated)+'</span>';
    initCharts();
  }).catch(function(e){console.error('creditos:',e);document.getElementById('creditos').innerHTML='<div class="card" style="padding:20px;color:var(--muted)">No se pudo cargar la información de créditos.</div>';});
})();
</script>
</body>
</html>
