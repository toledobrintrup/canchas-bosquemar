<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Créditos Bancarios · Intranet Canchas Bosquemar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Oxanium:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/intranet.css?v=32">
<script src="assets/intranet.js?v=32"></script>
<style>
  /* Paleta del módulo · teal = capital / lo tuyo · naranjo = interés / costo · pizarra = tasa — theme-aware */
  :root{
    --cr-org:#ff7a1a; --cr-org-ink:#d9640f; --cr-org-soft:rgba(255,122,26,.09); --cr-org-line:rgba(255,122,26,.24);
    --cr-teal-ink:#0a8f7a; --cr-teal-soft:var(--accent-soft); --cr-teal-line:rgba(15,184,156,.26); --cr-teal-tint:#d9f1ea;
    --cr-slate:#4c6b80; --cr-slate-soft:#eef2f6; --cr-sq-pend:#e9edeb; --cr-grid:#eef2f0;
  }
  [data-theme="dark"]{
    --cr-org:#ff9a4d; --cr-org-ink:#ffb070; --cr-org-soft:rgba(255,154,77,.13); --cr-org-line:rgba(255,154,77,.26);
    --cr-teal-ink:var(--accent); --cr-teal-line:rgba(44,240,201,.24); --cr-teal-tint:rgba(44,240,201,.15);
    --cr-slate:#9fc0d6; --cr-slate-soft:rgba(159,192,214,.12); --cr-sq-pend:rgba(255,255,255,.09); --cr-grid:rgba(255,255,255,.08);
  }

  /* ===== Dashboard (resumen de todos los créditos) ===== */
  .cred-dash{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-bottom:16px}
  .cred-dcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;position:relative;overflow:hidden;box-shadow:var(--card-shadow)}
  .cred-dcard::before{content:"";position:absolute;left:0;right:0;top:0;height:3px;background:linear-gradient(90deg,var(--accent) 0%,var(--accent) 62%,#ff7a1a 100%)}
  .cred-dcard .dl{font-family:var(--mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.09em;color:var(--faint);font-weight:600}
  .cred-dcard .dv{font-family:var(--mono);font-weight:700;font-size:1.62rem;letter-spacing:-.03em;color:var(--ink);margin-top:9px;line-height:1}
  .cred-dcard.accent .dv{color:var(--cr-teal-ink)}
  .cred-dcard.cost .dv{color:var(--cr-org-ink)}
  .cred-dcard .ds{font-family:var(--mono);font-size:.72rem;color:var(--muted);margin-top:7px}
  .cred-dupd{font-family:var(--mono);font-size:.72rem;color:var(--muted);margin:0 2px 20px}
  .cred-dupd b{color:var(--ink);font-weight:600}

  /* ===== Línea de tiempo (gantt de créditos) ===== */
  .cred-tlcard{margin-bottom:20px}
  .cred-tl{padding:12px 22px 18px}
  .cred-tl-axis{position:relative;height:16px;margin-bottom:12px}
  .cred-tl-axis span{position:absolute;transform:translateX(-50%);font-family:var(--mono);font-size:.66rem;color:var(--faint)}
  .cred-tl-plot{position:relative}
  .cred-tl-g{position:absolute;top:0;bottom:0;width:1px;background:var(--line);opacity:.7}
  .cred-tl-crow{position:relative;height:34px;margin-bottom:12px}
  .cred-tl-bar{position:absolute;top:0;height:34px;border-radius:10px;display:flex;align-items:center;overflow:hidden;cursor:pointer;z-index:2;transition:filter .12s,box-shadow .15s}
  .cred-tl-bar:hover{filter:brightness(1.04)}
  .cred-tl-bar.vig{background:var(--cr-teal-soft);box-shadow:0 3px 14px rgba(15,184,156,.16),inset 0 0 0 1px var(--cr-teal-line)}
  .cred-tl-bar .fill{position:absolute;left:0;top:0;bottom:0;border-radius:10px;background:var(--accent);opacity:.5}
  .cred-tl-bar.pag{background:var(--cr-teal-tint);box-shadow:inset 0 0 0 1px var(--cr-teal-line)}
  .cred-tl-bar .cin{position:relative;z-index:1;font-family:var(--mono);font-size:.68rem;font-weight:700;color:var(--ink);padding:0 12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cred-tl-bar.pag .cin{color:var(--cr-teal-ink)}
  .cred-tl-bar .cpct{position:relative;z-index:1;margin-left:auto;font-family:var(--mono);font-size:.66rem;font-weight:700;color:var(--cr-teal-ink);padding-right:12px;white-space:nowrap;flex:none}
  .cred-tl-bar .cpct.done{color:var(--accent)}
  .cred-tl-bar.on{box-shadow:0 0 0 2px var(--accent),0 3px 16px rgba(15,184,156,.24)}
  .cred-tl-hoy{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--cr-org);border-radius:2px;z-index:1;pointer-events:none;transform:translateX(-50%)}
  .cred-tl-flag{position:absolute;top:-18px;transform:translateX(-50%);z-index:5;pointer-events:none;font-family:var(--mono);font-size:.58rem;font-weight:700;color:#fff;background:var(--cr-org);padding:1px 6px;border-radius:5px}
  .cred-tl-leg{display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;font-family:var(--mono);font-size:.68rem;color:var(--muted)}
  .cred-tl-leg span{display:inline-flex;align-items:center;gap:6px}
  .cred-tl-leg i{width:11px;height:11px;border-radius:3px}
  .cred-tl-leg i.lv{background:var(--cr-teal-soft);box-shadow:inset 0 0 0 1px var(--accent)}
  .cred-tl-leg i.lp{background:var(--cr-teal-tint);box-shadow:inset 0 0 0 1px var(--cr-teal-line)}
  .cred-tl-leg i.lh{background:var(--cr-org)}

  /* ===== Selector de crédito ===== */
  .cred-selwrap{margin:0 0 16px}
  .cred-sellbl{font-family:var(--mono);font-size:.6rem;letter-spacing:.11em;text-transform:uppercase;color:var(--faint);font-weight:600;margin:0 2px 9px}
  .cred-sel{display:flex;gap:10px;flex-wrap:wrap}
  .cred-selbtn{display:flex;align-items:center;gap:11px;padding:11px 16px;border-radius:12px;border:1px solid var(--line);background:var(--panel);cursor:pointer;transition:border-color .15s,background .15s,transform .1s;text-align:left}
  .cred-selbtn:hover{border-color:var(--accent)}
  .cred-selbtn:active{transform:scale(.985)}
  .cred-selbtn.on{border-color:var(--accent);background:var(--accent-soft)}
  .cred-selbtn .sd{width:9px;height:9px;border-radius:50%;flex:none}
  .cred-selbtn>span:not(.sd):not(.schev){display:flex;flex-direction:column;gap:2px;min-width:0}
  .cred-selbtn .snm{display:block;font-weight:600;font-size:.9rem;color:var(--ink);line-height:1.2}
  .cred-selbtn .smeta{display:block;font-family:var(--mono);font-size:.68rem;color:var(--muted)}
  .cred-selbtn .schev{color:var(--faint);margin-left:2px}
  .cred-selbtn.on .schev{color:var(--accent)}

  /* ===== Detalle del crédito ===== */
  .cred{margin-bottom:14px}
  .cred-estado{display:inline-flex;align-items:center;gap:7px;font-size:.78rem;font-weight:600;padding:5px 12px;border-radius:20px}
  .cred-estado .dot{width:7px;height:7px;border-radius:50%}
  .cred-estado.vig{color:#15824c;background:var(--green-soft);border:1px solid rgba(21,130,76,.22)}
  .cred-estado.vig .dot{background:#15824c}
  [data-theme="dark"] .cred-estado.vig{color:#3ad97f;border-color:rgba(58,217,127,.22)}
  [data-theme="dark"] .cred-estado.vig .dot{background:#3ad97f}
  .cred-estado.pag{color:var(--muted);background:var(--panel-2);border:1px solid var(--line)}
  .cred-estado.pag .dot{background:var(--faint)}
  .cred-body{padding:20px 22px}

  .cred-hero{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap;padding-bottom:18px;border-bottom:1px solid var(--line)}
  .cred-lbl{font-family:var(--mono);font-size:.64rem;text-transform:uppercase;letter-spacing:.09em;color:var(--faint);font-weight:500;margin-bottom:9px}
  .cred-big{font-family:var(--mono);font-weight:700;font-size:2.3rem;letter-spacing:-.03em;line-height:1;color:var(--ink)}
  .cred-sub{font-family:var(--mono);font-size:.8rem;color:var(--muted);margin-top:9px}
  .cred-prox{text-align:right}
  .cred-prox-v{font-family:var(--mono);font-weight:600;font-size:1.3rem;color:var(--accent);line-height:1}
  .cred-progwrap{padding:16px 0;border-bottom:1px solid var(--line)}
  .cred-progtop{display:flex;justify-content:space-between;font-size:.82rem;color:var(--muted);margin-bottom:9px;font-family:var(--mono)}
  .cred-bar{height:8px;background:var(--panel-2);border:1px solid var(--line);border-radius:5px;overflow:hidden}
  .cred-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#ff7a1a);border-radius:5px}

  .cred-nsec{font-family:var(--mono);font-size:.6rem;letter-spacing:.11em;text-transform:uppercase;color:var(--faint);font-weight:600;margin:20px 0 12px}
  .cred-feat{display:grid;grid-template-columns:repeat(auto-fit,minmax(258px,1fr));gap:14px}
  .cred-fc{border-radius:13px;padding:15px 18px;display:flex;align-items:center;justify-content:center;gap:18px}
  .cred-fc.teal{background:var(--cr-teal-soft);border:1px solid var(--cr-teal-line)}
  .cred-fc.org{background:var(--cr-org-soft);border:1px solid var(--cr-org-line)}
  .cred-rg{flex:none;position:relative;width:78px;height:78px}
  .cred-rg svg{width:78px;height:78px;display:block}
  .cred-rg circle{fill:none;stroke-width:9}
  .cred-rg .rc{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:.92rem}
  .cred-fc.teal .rg-t{stroke:var(--cr-teal-line)} .cred-fc.teal .rg-f{stroke:var(--accent);stroke-linecap:round} .cred-fc.teal .rc{color:var(--cr-teal-ink)}
  .cred-fc.org  .rg-t{stroke:var(--cr-org-line)}  .cred-fc.org  .rg-f{stroke:var(--cr-org);stroke-linecap:round}  .cred-fc.org  .rc{color:var(--cr-org-ink)}
  .cred-fl{font-size:.72rem;color:var(--muted);font-weight:500}
  .cred-fv{font-family:var(--mono);font-weight:700;font-size:1.7rem;letter-spacing:-.03em;line-height:1.05;margin:3px 0}
  .cred-fc.teal .cred-fv{color:var(--cr-teal-ink)} .cred-fc.org .cred-fv{color:var(--cr-org-ink)}
  .cred-fs{font-size:.72rem;font-family:var(--mono);color:var(--muted)}

  .cred-chips{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-top:14px}
  .cred-chip{display:flex;align-items:center;gap:11px;border:1px solid var(--line);border-radius:10px;padding:9px 13px;background:var(--panel-2)}
  .cred-chip .ci{display:grid;place-items:center;flex:none;color:var(--muted)}
  .cred-chip .ci svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.55;stroke-linecap:round;stroke-linejoin:round}
  .cred-chip .cl{font-size:.63rem;text-transform:uppercase;letter-spacing:.05em;color:var(--faint)}
  .cred-chip .cv{font-family:var(--mono);font-weight:700;font-size:.95rem;margin-top:1px;color:var(--ink)}
  .cred-chip .cv small{font-weight:400;color:var(--muted);font-size:.82em}

  .cred-foot{display:flex;flex-wrap:wrap;justify-content:center;gap:7px 18px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line);font-size:.76rem;color:var(--muted);font-family:var(--mono)}
  .cred-foot span{display:inline-flex;align-items:center;gap:6px}
  .cred-foot b{color:var(--ink);font-weight:600}
  .cred-foot svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;color:var(--faint);flex:none}

  /* ===== Gráficos ===== */
  .cred-graf{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
  @media(max-width:880px){.cred-graf{grid-template-columns:1fr}}
  .cred-graf .card{display:flex;flex-direction:column}
  .cred-glg{display:inline-flex;gap:12px;font-family:var(--mono);font-size:.68rem;color:var(--muted);font-weight:500}
  .cred-glg i{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:5px}
  .cred-glg i.teal{background:var(--accent)}
  .cred-glg i.org{background:#ff7a1a}
  .cred-glg i.pend{background:var(--line)}
  .cred-gbody{padding:16px 16px 14px;display:flex;flex:1;align-items:center;justify-content:center;min-height:150px}
  .cred-gbody svg{width:100%;display:block}
  .cred-gbody svg text{font-family:var(--mono)}
  .cred-gbody .ax{font-size:10px;fill:var(--faint)}
  .cred-gbody .cl{font-size:9.5px;fill:var(--muted)}
  .cred-gbody .cl2{font-size:10px;fill:var(--muted)}
  .cred-gbody .ccpaid{font-size:10px;fill:var(--accent);font-weight:600}
  .cred-gbody .hoy{font-size:9.5px;fill:var(--ink);font-weight:600}
  .cred-gbody .kpi{fill:var(--accent)}
  .cred-gbody .clt{fill:var(--cr-teal-ink)}.cred-gbody .clo{fill:var(--cr-org-ink)}
  .cgsq{cursor:default;transition:filter .12s}
  .cgsq:hover{filter:brightness(1.09)}
  .cgz{cursor:crosshair}
  .cred-tip{position:fixed;z-index:9999;pointer-events:none;background:var(--ink);color:var(--panel);font-family:var(--mono);font-size:.72rem;line-height:1.55;padding:8px 11px;border-radius:9px;box-shadow:0 8px 22px rgba(0,0,0,.28);opacity:0;transition:opacity .12s;white-space:nowrap}
  .cred-tip b{font-weight:700}
  .cred-avwrap{width:100%;max-width:470px;margin:0 auto;display:flex;flex-direction:column;justify-content:center;gap:20px}
  .cred-avgrid{display:flex;justify-content:center}
  .cred-avgrid svg{max-width:100%;overflow:visible}
  .cred-avstats{display:grid;grid-template-columns:1fr 1fr;gap:14px 20px;border-top:1px solid var(--line);padding-top:16px}
  .cred-avstats>div{display:flex;flex-direction:column;align-items:center;text-align:center;gap:2px;min-width:0}
  .cred-avstats span{font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;color:var(--faint)}
  .cred-avstats b{font-family:var(--mono);font-size:1rem;font-weight:700;color:var(--ink);white-space:nowrap}
  .cred-avstats small{font-family:var(--mono);font-size:.68rem;color:var(--muted)}

  /* ===== Tablas ===== */
  .cred-cal{margin-bottom:18px}
  .cred-link{display:inline-flex;align-items:center;gap:6px;font-size:.74rem;color:var(--accent);font-family:var(--mono)}
  .cred-link svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
  .cred-caltbl{max-height:440px;overflow:auto}
  .cred-caltbl table{width:100%;border-collapse:collapse;font-size:.86rem}
  .cred-caltbl th{text-align:left;padding:11px 22px;font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:500;position:sticky;top:0;background:var(--panel);border-bottom:1px solid var(--line);z-index:1}
  .cred-caltbl th.num,.cred-caltbl td.num{text-align:right}
  .cred-caltbl td{padding:11px 22px;border-bottom:1px solid var(--line-2);color:var(--ink)}
  .cred-caltbl td.num{font-family:var(--mono)}
  .cred-caltbl tr:hover td{background:var(--panel-2)}
  .cred-cn{font-family:var(--mono);color:var(--cr-teal-ink);font-weight:600}
  .cred-ok{color:var(--green);font-weight:600}
</style>
</head>
<body>
<aside class="side">
  <a class="brand" href="/"><span class="mark"><img src="assets/logo/cb-isotipo.png" alt="CB"></span><span><b>Canchas Bosquemar</b><small>Intranet</small></span></a>
  <nav class="nav"></nav>
  <div class="foot"><a href="/"><svg class="ico" viewBox="0 0 24 24" style="margin-right:9px"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>Volver al sitio</a></div>
</aside>
<div class="main">
  <header class="topbar">
    <h1>Créditos Bancarios</h1>
    <div class="right"><div class="user"></div></div>
  </header>
  <div class="content">
    <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
      <symbol id="cr-cash" viewBox="0 0 24 24"><rect x="2.5" y="6" width="19" height="12" rx="2.2"/><circle cx="12" cy="12" r="2.6"/><path d="M6 9.4h.01M18 14.6h.01"/></symbol>
      <symbol id="cr-pct" viewBox="0 0 24 24"><circle cx="7" cy="7" r="2.3"/><circle cx="17" cy="17" r="2.3"/><path d="M18 6 6 18"/></symbol>
      <symbol id="cr-cal" viewBox="0 0 24 24"><rect x="3.5" y="5" width="17" height="15" rx="2.2"/><path d="M3.5 9.5h17M8 3v4M16 3v4"/></symbol>
      <symbol id="cr-doc" viewBox="0 0 24 24"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></symbol>
      <symbol id="cr-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M12 7.5V12l3 2"/></symbol>
      <symbol id="cr-build" viewBox="0 0 24 24"><path d="M4 21V6l8-3 8 3v15M9 21v-5h6v5M8 9.5h.01M12 9.5h.01M16 9.5h.01M8 13.5h.01M12 13.5h.01M16 13.5h.01"/></symbol>
      <symbol id="cr-bank" viewBox="0 0 24 24"><path d="M3 9.5 12 4l9 5.5M5 10.5v7.5M19 10.5v7.5M9.5 10.5v7.5M14.5 10.5v7.5M3.5 20.5h17"/></symbol>
      <symbol id="cr-link" viewBox="0 0 24 24"><path d="M9 15l6-6M10.5 6.5 12 5a3.5 3.5 0 0 1 5 5l-1.5 1.5M13.5 17.5 12 19a3.5 3.5 0 0 1-5-5l1.5-1.5"/></symbol>
    </defs></svg>

    <div class="cred-dupd" id="credUpd"></div>
    <div class="cred-dash" id="credDash"></div>
    <div class="card cred-tlcard" id="credTLcard" style="display:none"><div class="card-h"><h3>Línea de tiempo de los créditos</h3><span style="font-size:.8rem;color:var(--muted)">otorgamiento → término</span></div><div class="cred-tl" id="credTL"></div></div>
    <div class="cred-selwrap"><div class="cred-sellbl">Selecciona un crédito</div><div class="cred-sel" id="credSel"></div></div>
    <div id="credDetalle"></div>
  </div>
</div>
<script>
(function(){
  var MES=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  function fmt(n){return (n<0?'−$':'$')+Math.abs(Math.round(n)).toLocaleString('es-CL');}
  function fmtM(n){var m=n/1e6;return '$'+m.toLocaleString('es-CL',{minimumFractionDigits:m<10?1:0,maximumFractionDigits:1})+'M';}
  function fdate(d){return d.slice(8,10)+' '+MES[+d.slice(5,7)-1]+' '+d.slice(0,4);}
  function fmes(d){return MES[+d.slice(5,7)-1]+' '+d.slice(0,4);}
  function pct(x,dec){return (x*100).toLocaleString('es-CL',{minimumFractionDigits:dec||0,maximumFractionDigits:dec||0})+'%';}
  function pc2(x){return x.toLocaleString('es-CL',{minimumFractionDigits:2,maximumFractionDigits:2})+'%';}
  function logoEmp(e){return e==='CB'?'<img class="lg-cb" src="assets/logo/cb-isotipo.png" alt="CB">':'<img class="lg-qq" src="assets/logo/qq.svg" alt="QQ">';}
  function ico(id){return '<svg><use href="#cr-'+id+'"></use></svg>';}
  function ts(d){return new Date(d+'T00:00:00').getTime();}

  function schedule(c){return (c.calPagadas||[]).concat(c.cal||[]);}
  // Indicadores desde el cronograma completo (calPagadas + cal). paidN se deriva de las cartolas
  // (glosa del crédito) si están enlazadas; si no, del campo cuotasPagadas.
  function calc(c,movs){
    var S=schedule(c);
    var pagos=(movs||[]).filter(function(m){return c.pagoGlosa && m.glosa===c.pagoGlosa && (!c.pagoCuenta||m.cuenta===c.pagoCuenta);})
                        .sort(function(a,b){return a.fecha<b.fecha?-1:(a.fecha>b.fecha?1:0);});
    var base=c.cuotasPagadas||0;
    var paidN=Math.min(S.length,Math.max(base,pagos.length));
    var paid=S.slice(0,paidN), pend=S.slice(paidN);
    var sc=function(a){return a.reduce(function(s,r){return s+r[1];},0);};
    var si=function(a){return a.reduce(function(s,r){return s+r[2];},0);};
    var capPagado=sc(paid),intPagado=si(paid),capPend=sc(pend),intPend=si(pend);
    var saldo=capPend+intPend, abonado=capPagado+intPagado, intTotal=intPagado+intPend;
    return {S:S,paid:paid,pend:pend,pagos:pagos,paidN:paidN,restantes:pend.length,
      capPagado:capPagado,intPagado:intPagado,capPend:capPend,intPend:intPend,
      saldo:saldo,abonado:abonado,intTotal:intTotal,avance:paidN/c.nCuotas,
      capPct:capPagado/c.monto,intSobreCap:intTotal/c.monto,tasaMens:c.tasaAnual/12,proxNum:paidN+1};
  }

  function pal(){
    var d=document.documentElement.getAttribute('data-theme')==='dark';
    return d?{teal:'#2cf0c9',org:'#ff9a4d',grid:'rgba(255,255,255,.08)',pend:'rgba(255,255,255,.10)'}
            :{teal:'#0fb89c',org:'#ff7a1a',grid:'#eef2f0',pend:'#eef2f0'};
  }

  /* ---- Gráfico anatomía de la cuota ---- */
  var G={W:470,H:248,mL:42,mR:12,mT:16,mB:30};
  G.x0=G.mL;G.x1=G.W-G.mR;G.y0=G.mT;G.y1=G.H-G.mB;
  function gf(n){return (+n).toFixed(1);}
  function anatSVG(S,paidN,vigente,P){
    var N=S.length;
    var X=function(i){return G.x0+(N>1?i/(N-1):0)*(G.x1-G.x0);};
    var maxC=Math.max.apply(null,S.map(function(d){return d[1]+d[2];}));
    var yMax=Math.ceil(maxC/1e6)*1e6||1e6;
    var Y=function(v){return G.y1-v/yMax*(G.y1-G.y0);};
    var cap=S.map(function(d,i){return [X(i),Y(d[1])];}),tot=S.map(function(d,i){return [X(i),Y(d[1]+d[2])];});
    var L=function(p){return p.map(function(q){return 'L'+gf(q[0])+' '+gf(q[1]);}).join('');};
    var capA='M'+gf(X(0))+' '+gf(G.y1)+L(cap)+'L'+gf(X(N-1))+' '+gf(G.y1)+'Z';
    var intA='M'+gf(cap[0][0])+' '+gf(cap[0][1])+L(cap.slice(1))+L(tot.slice().reverse())+'Z';
    var capLn='M'+gf(cap[0][0])+' '+gf(cap[0][1])+L(cap.slice(1));
    var g='';[0,yMax/2,yMax].forEach(function(t){var y=gf(Y(t));g+='<line x1="'+G.x0+'" y1="'+y+'" x2="'+G.x1+'" y2="'+y+'" stroke="'+P.grid+'"/><text x="'+(G.x0-7)+'" y="'+gf(Y(t)+3)+'" text-anchor="end" class="ax">'+fmtM(t)+'</text>';});
    var idx=[0,Math.round((N-1)/3),Math.round(2*(N-1)/3),N-1],xl='';
    idx.forEach(function(i){xl+='<text x="'+gf(X(i))+'" y="'+(G.y1+14)+'" text-anchor="middle" class="ax">'+(i+1)+'</text><text x="'+gf(X(i))+'" y="'+(G.y1+26)+'" text-anchor="middle" class="ax" style="font-size:8.5px">'+S[i][0].slice(0,4)+'</text>';});
    var hoy='';
    if(vigente&&paidN<N){var xh=gf(X(paidN-0.5));hoy='<line x1="'+xh+'" y1="'+G.y0+'" x2="'+xh+'" y2="'+G.y1+'" stroke="'+P.org+'" stroke-dasharray="3 3" opacity=".55"/><text x="'+xh+'" y="'+(G.y0-4)+'" text-anchor="middle" class="hoy">hoy</text>';}
    var step=(G.x1-G.x0)/(N-1),hz='';
    for(var i=0;i<N;i++){var est=i<paidN?'pagada':(i===paidN&&vigente?'próxima':'pendiente');
      hz+='<rect class="cgz" x="'+gf(X(i)-step/2)+'" y="'+G.y0+'" width="'+gf(step)+'" height="'+gf(G.y1-G.y0)+'" fill="transparent" data-c="'+(i+1)+'" data-n="'+N+'" data-cap="'+S[i][1]+'" data-int="'+S[i][2]+'" data-est="'+est+'" data-fec="'+S[i][0]+'"/>';}
    return '<svg viewBox="0 0 '+G.W+' '+G.H+'" width="100%">'+g+
      '<path d="'+capA+'" fill="'+P.teal+'" opacity=".78"/>'+
      '<path d="'+intA+'" fill="'+P.org+'" opacity=".82"/>'+
      '<path d="'+capLn+'" fill="none" stroke="var(--panel)" stroke-width="1.3" opacity=".9"/>'+
      '<text x="'+gf(X(Math.min(2,N-1)))+'" y="'+gf(Y(S[Math.min(2,N-1)][1])-8)+'" class="cl clt">Capital</text>'+
      '<text x="'+gf(X(Math.min(2,N-1)))+'" y="'+gf(Y(S[Math.min(2,N-1)][1]+S[Math.min(2,N-1)][2])-6)+'" class="cl clo">Interés</text>'+
      hoy+xl+hz+'</svg>';
  }

  /* ---- Gráfico avance ---- */
  function avanceHTML(c,k,P){
    var paidN=k.paidN,S=k.S,N=c.nCuotas,vig=c.estado==='vigente';
    var cell=20,gap=6,sx=118,cols=12,rows=Math.ceil(N/12),cntW=46;
    var W=sx+cols*cell+(cols-1)*gap+cntW,H=rows*cell+(rows-1)*gap;
    var r='';
    for(var i=0;i<N;i++){var yr=Math.floor(i/12),pos=i%12,x=sx+pos*(cell+gap),y=yr*(cell+gap);
      var paid=i<paidN,nx=(i===paidN&&vig),est=paid?'pagada':(nx?'próxima':'pendiente');
      r+='<rect class="cgsq" x="'+x+'" y="'+y+'" width="'+cell+'" height="'+cell+'" rx="4" fill="'+(paid?P.teal:P.pend)+'"'+(nx?' stroke="'+P.org+'" stroke-width="2"':'')+' data-c="'+(i+1)+'" data-n="'+N+'" data-est="'+est+'" data-fec="'+S[i][0]+'"/>';}
    var xe=sx+cols*cell+(cols-1)*gap;
    for(var rw=0;rw<rows;rw++){var cy=rw*(cell+gap)+cell/2+3.5;
      var rc=Math.min(12,N-rw*12), pin=0; for(var j=rw*12;j<rw*12+rc;j++){if(j<paidN)pin++;}
      var yLab=S[Math.min(rw*12+6,N-1)][0].slice(0,4);
      r+='<text x="'+(sx-8)+'" y="'+cy+'" text-anchor="end" class="ax">'+yLab+'</text>';
      r+='<text x="'+(xe+8)+'" y="'+cy+'" class="'+(pin?'ccpaid':'cl2')+'">'+pin+'/'+rc+'</text>';}
    r+='<text x="0" y="'+(H/2-3)+'" class="kpi" style="font-size:24px;font-weight:700">'+paidN+'/'+N+'</text><text x="0" y="'+(H/2+15)+'" class="cl">'+Math.round(paidN/N*100)+'% pagado</text>';
    var grid='<div class="cred-avgrid"><svg viewBox="-3 -3 '+(W+6)+' '+(H+6)+'" width="100%" style="max-width:'+(W+6)+'px">'+r+'</svg></div>';
    var st=function(lb,v,sm){return '<div><span>'+lb+'</span><b>'+v+'</b><small>'+(sm||'&nbsp;')+'</small></div>';};
    var stats;
    if(vig){stats='<div class="cred-avstats">'+
      st('Total abonado',fmt(k.abonado),paidN+(paidN==1?' cuota':' cuotas')+' pagadas')+
      st('Interés ya pagado',fmt(k.intPagado),'de lo abonado')+
      st('Falta por pagar',fmt(k.saldo),k.restantes+' cuotas')+
      st('Término',fdate(c.termino),'última cuota')+'</div>';
    }else{stats='<div class="cred-avstats">'+
      st('Total pagado',fmt(k.abonado),N+' cuotas')+
      st('Capital',fmt(k.capPagado),'del crédito')+
      st('Interés total',fmt(k.intTotal),pct(k.intSobreCap,1)+' del capital')+
      st('Pagado',fdate(c.emision)+' →',fdate(c.termino))+'</div>';
    }
    return '<div class="cred-avwrap">'+grid+stats+'</div>';
  }

  /* ---- Hover tooltip ---- */
  var _tip;
  function tip(){if(!_tip){_tip=document.createElement('div');_tip.className='cred-tip';document.body.appendChild(_tip);}return _tip;}
  function estTxt(e){return e==='pagada'?'✓ pagada':(e==='próxima'?'próxima cuota':'pendiente');}
  function wire(box,kind){
    var t=tip();
    box.addEventListener('mousemove',function(e){
      var el=e.target.closest('[data-c]'); if(!el){t.style.opacity=0;return;}
      var c=el.getAttribute('data-c'),n=el.getAttribute('data-n'),est=el.getAttribute('data-est'),fec=el.getAttribute('data-fec');
      var h='<b>Cuota '+c+'/'+n+'</b> · '+estTxt(est);
      if(kind==='anat'){var cap=+el.getAttribute('data-cap'),it=+el.getAttribute('data-int');
        h+='<br>Capital '+fmt(cap)+'<br>Interés '+fmt(it)+'<br>Cuota '+fmt(cap+it);}
      else{h+='<br>'+(est==='pagada'?'Pagada el ':'Vence ')+fdate(fec);}
      t.innerHTML=h;t.style.opacity=1;
      var tx=e.clientX+14,ty=e.clientY+14; if(tx+230>window.innerWidth)tx=e.clientX-230;
      t.style.left=tx+'px';t.style.top=ty+'px';
    });
    box.addEventListener('mouseleave',function(){t.style.opacity=0;});
  }

        '<span>'+ico('build')+c.titular+'</span>'+
        '<span>'+ico('bank')+c.banco+'</span>'+

      '</div>';
    // Pagos realizados (desde el cronograma)
    var pagosCard='';
    if(k.paidN){

      var note=(c.pagoGlosa&&k.pagos.length)?'<span class="cred-link">'+ico('link')+'enlazado a cartolas · '+k.paidN+' cuotas</span>':'<span style="font-size:.8rem;color:var(--muted)">'+k.paidN+' cuotas</span>';
      pagosCard='<div class="card cred-cal"><div class="card-h"><h3>Pagos realizados</h3>'+note+'</div>'+
        '<div class="cred-caltbl"><table><thead><tr><th>N° cuota</th><th>Fecha</th><th class="num">Capital</th><th class="num">Interés</th><th class="num">Cuota</th></tr></thead><tbody>'+pr+'</tbody></table></div></div>';
    }
    var calCard='';

      calCard='<div class="card cred-cal"><div class="card-h"><h3>Calendario de pagos</h3><span style="font-size:.8rem;color:var(--muted)">'+k.restantes+' cuotas pendientes</span></div>'+

  function ring(v,label){v=Math.max(0,Math.min(100,v));
    return '<span class="cred-rg"><svg viewBox="0 0 78 78"><circle class="rg-t" cx="39" cy="39" r="31"></circle><circle class="rg-f" cx="39" cy="39" r="31" pathLength="100" stroke-dasharray="'+v.toFixed(1)+' '+(100-v).toFixed(1)+'" transform="rotate(-90 39 39)"></circle></svg><span class="rc">'+label+'</span></span>';}
  function chip(iconId,lbl,val){return '<div class="cred-chip"><span class="ci">'+ico(iconId)+'</span><div><div class="cl">'+lbl+'</div><div class="cv">'+val+'</div></div></div>';}

  /* ---- Dashboard ---- */
  function renderDash(list){
    var vig=list.filter(function(x){return x.c.estado==='vigente';});
    var deuda=vig.reduce(function(s,x){return s+x.k.saldo;},0);
    var financiado=list.reduce(function(s,x){return s+x.c.monto;},0);
    var interes=list.reduce(function(s,x){return s+x.k.intTotal;},0);
    var abonado=list.reduce(function(s,x){return s+x.k.abonado;},0);
    var cp=list.reduce(function(s,x){return s+x.k.paidN;},0), ct=list.reduce(function(s,x){return s+x.c.nCuotas;},0);
    var nPag=list.length-vig.length;
    function card(cls,l,v,s){return '<div class="cred-dcard '+cls+'"><div class="dl">'+l+'</div><div class="dv">'+v+'</div><div class="ds">'+s+'</div></div>';}
    return card('accent','Deuda vigente',fmt(deuda),vig.length+' vigente'+(vig.length!=1?'s':'')+' · '+nPag+' pagado'+(nPag!=1?'s':''))+
      card('','Total financiado',fmt(financiado),list.length+' crédito'+(list.length!=1?'s':''))+
      card('cost','Interés total',fmt(interes),'costo del financiamiento')+
      card('','Abonado a la fecha',fmt(abonado),cp+' de '+ct+' cuotas');
  }

  /* ---- Línea de tiempo ---- */
  function renderTL(list){
    if(list.length<1)return '';
    var emis=list.map(function(x){return ts(x.c.emision);}),term=list.map(function(x){return ts(x.c.termino);});
    var t0=Math.min.apply(null,emis),t1=Math.max.apply(null,term);
    var pad=(t1-t0)*0.03; t0-=pad; t1+=pad;
    var P=function(t){return (t-t0)/(t1-t0)*100;};
    var hoy=Date.now(), hp=P(hoy), showHoy=hoy>=t0&&hoy<=t1;
    // eje de años
    var y0=new Date(t0).getFullYear(),y1=new Date(t1).getFullYear(),ax='',gl='';
    for(var y=y0;y<=y1;y++){var xp=P(ts(y+'-01-01')); if(xp>=0&&xp<=100){ax+='<span style="left:'+xp+'%">'+y+'</span>';gl+='<i style="left:'+xp+'%"></i>';}}
    var hoyLn=showHoy?'<div class="cred-tl-hoy" style="left:'+hp+'%"></div>':'';
    var hoyFlag=showHoy?'<div class="cred-tl-flag" style="left:'+hp+'%">hoy</div>':'';
    var rows=list.map(function(x){
      var c=x.c,k=x.k,vig=c.estado==='vigente';
      var l=P(ts(c.emision)),w=P(ts(c.termino))-l;
      var inner=vig
        ?'<div class="fill" style="width:'+(k.avance*100).toFixed(1)+'%"></div><span class="cin">'+c.destino+'</span><span class="cpct">'+Math.round(k.avance*100)+'%</span>'
        :'<span class="cin">'+c.destino+'</span><span class="cpct done">✓ pagado</span>';
      var tip=c.destino+' · '+fmes(c.emision)+' → '+fmes(c.termino)+' · '+(vig?('vigente '+Math.round(k.avance*100)+'%'):'pagado');
      return '<div class="cred-tl-crow"><div class="cred-tl-bar '+(vig?'vig':'pag')+'" data-bar="'+c.id+'" title="'+tip+'" onclick="cbSelCred(\''+c.id+'\')" style="left:'+l+'%;width:'+w+'%">'+inner+'</div></div>';
    }).join('');
    var leg='<div class="cred-tl-leg"><span><i class="lv"></i>Vigente (avance)</span><span><i class="lp"></i>Pagado</span>'+(showHoy?'<span><i class="lh"></i>hoy</span>':'')+'</div>';
    return '<div class="cred-tl-axis">'+ax+'</div><div class="cred-tl-plot">'+gl+hoyLn+hoyFlag+rows+'</div>'+leg;
  }

  /* ---- Selector ---- */
  function renderSel(list){
    return list.map(function(x){var c=x.c,k=x.k,vig=c.estado==='vigente';
      var dot=vig?'var(--accent)':'var(--faint)';
      var meta=vig?('Vigente · saldo '+fmtM(k.saldo)):('Pagado · '+c.nCuotas+' cuotas');
      return '<button class="cred-selbtn" data-id="'+c.id+'" onclick="cbSelCred(\''+c.id+'\')">'+
        '<span class="sd" style="background:'+dot+'"></span>'+
        '<span><span class="snm">'+c.destino+'</span><span class="smeta">'+meta+'</span></span>'+
        '<span class="schev">›</span></button>';

  /* ---- Estado + orquestación ---- */
  var LIST=[], SEL=null;
  function find(id){for(var i=0;i<LIST.length;i++)if(LIST[i].c.id===id)return LIST[i];return LIST[0];}
  function paintCharts(x){var an=document.getElementById('ganat-'+x.c.id),av=document.getElementById('gav-'+x.c.id),P=pal();
    if(an)an.innerHTML=anatSVG(x.k.S,x.k.paidN,x.c.estado==='vigente',P);
    if(av)av.innerHTML=avanceHTML(x.c,x.k,P);}
  function selActive(){
    [].forEach.call(document.querySelectorAll('.cred-selbtn'),function(b){b.classList.toggle('on',b.getAttribute('data-id')===SEL);});
    [].forEach.call(document.querySelectorAll('.cred-tl-bar'),function(b){b.classList.toggle('on',b.getAttribute('data-bar')===SEL);});
  }
  window.cbSelCred=function(id){
    SEL=id; var x=find(id);
    document.getElementById('credDetalle').innerHTML=renderDetalle(x.c,x.k);
    paintCharts(x);
    var an=document.getElementById('ganat-'+x.c.id),av=document.getElementById('gav-'+x.c.id);
    if(an)wire(an,'anat'); if(av)wire(av,'avance');
    selActive();
  };
  window.addEventListener('themechange',function(){if(SEL)paintCharts(find(SEL));});

  Promise.all([
    fetch('data/creditos.json?v=5').then(function(r){return r.json();}),
    fetch('data/qq-movimientos.json?v=1').then(function(r){return r.json();}).catch(function(){return {movimientos:[]};})
  ]).then(function(res){
    var d=res[0], movs=(res[1]&&res[1].movimientos)||[];
    LIST=d.creditos.map(function(c){return {c:c,k:calc(c,movs)};});
    document.getElementById('credUpd').innerHTML='Resumen de créditos · al <b>'+fdate(d.updated)+'</b>';
    document.getElementById('credDash').innerHTML=renderDash(LIST);
    if(LIST.length>=1){document.getElementById('credTLcard').style.display='';document.getElementById('credTL').innerHTML=renderTL(LIST);}
    document.getElementById('credSel').innerHTML=renderSel(LIST);
    // por defecto: primer vigente, o el primero
    var def=LIST.filter(function(x){return x.c.estado==='vigente';})[0]||LIST[0];
    window.cbSelCred(def.c.id);
  }).catch(function(e){console.error('creditos:',e);document.getElementById('credDetalle').innerHTML='<div class="card" style="padding:20px;color:var(--muted)">No se pudo cargar la información de créditos.</div>';});
})();
</script>
